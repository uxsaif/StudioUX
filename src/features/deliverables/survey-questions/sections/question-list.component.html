<div class="question-list">
  <div class="question-list__search">
    <input
      type="text"
      placeholder="Search questions…"
      class="question-list__search-input"
    />
  </div>

  <ul class="question-list__items">
    <li
      *ngFor="let q of questions; trackBy: trackById"
      class="question-list__item"
      [class.question-list__item--selected]="q.id === selectedId"
      (click)="questionSelected.emit(q)"
    >
      <div class="question-list__item-top">
        <span class="question-list__order">Q{{ q.order }}</span>
        <bases-badge [variant]="typeBadgeVariant(q.type)">{{ typeLabel(q.type) }}</bases-badge>
      </div>

      <p class="question-list__text">
        {{ q.text || '(Untitled question)' }}
      </p>

      <div class="question-list__item-bottom">
        <span class="question-list__category">{{ q.category }}</span>
        <button
          class="question-list__delete"
          aria-label="Delete question"
          (click)="questionDeleted.emit(q); $event.stopPropagation()"
        >
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    </li>
  </ul>

  <div *ngIf="questions.length === 0" class="question-list__empty">
    <p>No questions yet.</p>
  </div>
</div>
