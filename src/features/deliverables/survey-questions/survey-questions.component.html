<!-- Survey Questions — Deliverable reporting page (matches Figma node 35667:171469) -->
<div class="sq-page">

  <!-- ── Brand bar (matches Figma node 38624:146889) ── -->
  <div class="sq-page__brand-bar">
    <div class="sq-page__brand-content">
      <!-- Logo -->
      <div class="sq-page__brand-logo-group">
        <img class="sq-page__brand-niq" src="https://www.figma.com/api/mcp/asset/2e35d055-844c-477e-b628-a4a0d94698da" alt="NIQ" />
        <img class="sq-page__brand-bases" src="https://www.figma.com/api/mcp/asset/d3898169-6bce-4261-9448-7b43ef389ab6" alt="BASES" />
        <img class="sq-page__brand-studio" src="https://www.figma.com/api/mcp/asset/62f9e511-bd08-4219-8060-35b29dd08749" alt="Studio" />
      </div>
      <!-- Actions -->
      <div class="sq-page__brand-actions">
        <button class="sq-page__brand-icon-btn" aria-label="Comments">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2h12v9H5l-3 3V2z" stroke="#000" stroke-width="1.2"/></svg>
        </button>
        <span class="sq-page__brand-divider"></span>
        <div class="sq-page__brand-hello">
          <span class="sq-page__brand-hello-text">Hello</span>
          <span class="sq-page__brand-hello-user">User</span>
          <svg class="sq-page__brand-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#373737" stroke-width="1.2"/></svg>
        </div>
        <span class="sq-page__brand-divider"></span>
        <button class="sq-page__brand-icon-btn" aria-label="Help">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#000" stroke-width="1.2"/><path d="M6 6a2 2 0 113 1.94V9" stroke="#000" stroke-width="1.2" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.5" fill="#000"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Main toolbar (Figma 38703:146521) ── -->
  <div class="sq-page__toolbar">
    <div class="sq-page__toolbar-left">
      <button class="sq-page__toolbar-home-btn" aria-label="Home">
        <img src="https://www.figma.com/api/mcp/asset/c3790d42-afb7-410a-accc-b2a59476095b" alt="" width="24" height="24" />
      </button>
      <span class="sq-page__project-name">PROJECT NAME</span>
    </div>
    <div class="sq-page__toolbar-icons">
      <!-- Group 1: IPFAR icons -->
      <div class="sq-page__toolbar-icon-group">
        <button class="sq-page__toolbar-tab" aria-label="Alerts">
          <img src="https://www.figma.com/api/mcp/asset/a2d14ca5-ad80-4e1a-9c18-14eacd0d5c27" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab" aria-label="Forecast">
          <img src="https://www.figma.com/api/mcp/asset/862e44c3-6b0c-4ebb-8ead-dff6a08dfad0" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab" aria-label="Surveys">
          <img src="https://www.figma.com/api/mcp/asset/99fcff8e-7ab5-4975-a18e-6fe77ad0a992" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab" aria-label="Modules">
          <img src="https://www.figma.com/api/mcp/asset/4923c7cc-2f0a-45e7-bd12-7637c6976024" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab" aria-label="Reports">
          <img src="https://www.figma.com/api/mcp/asset/994e0c9b-3bf9-461d-8248-a80a8b68ef6e" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab sq-page__toolbar-tab--active" aria-label="Charts">
          <img src="https://www.figma.com/api/mcp/asset/1718258c-51b9-4b5f-9440-f489ce664a70" alt="" width="16" height="16" />
        </button>
      </div>

      <div class="sq-page__toolbar-divider"></div>

      <!-- Group 2: User/Screen/Comment -->
      <div class="sq-page__toolbar-icon-group">
        <button class="sq-page__toolbar-tab" aria-label="Users">
          <img src="https://www.figma.com/api/mcp/asset/e452224b-0acd-4514-b00b-4be9ee904440" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab" aria-label="Screen">
          <img src="https://www.figma.com/api/mcp/asset/224b0cad-6d0c-4898-b1a8-c4f4d5d65319" alt="" width="16" height="16" />
        </button>
        <button class="sq-page__toolbar-tab" aria-label="Comments">
          <img src="https://www.figma.com/api/mcp/asset/b38302a4-d778-430a-88a7-0f0abbe10341" alt="" width="16" height="16" />
        </button>
      </div>

      <div class="sq-page__toolbar-divider"></div>

      <!-- Wrench -->
      <div class="sq-page__toolbar-icon-group">
        <button class="sq-page__toolbar-tab" aria-label="Settings">
          <img src="https://www.figma.com/api/mcp/asset/fda06358-8297-47ce-9261-461a331b28d1" alt="" width="16" height="16" />
        </button>
      </div>

      <div class="sq-page__toolbar-divider"></div>

      <!-- Three dots (Icon/System/ellipsis-vertical, Figma 0:750) -->
      <div class="sq-page__toolbar-icon-group">
        <button class="sq-page__toolbar-tab" aria-label="More">
          <img src="https://www.figma.com/api/mcp/asset/6a89e62a-66af-42d8-90bf-e7727c5e8585" alt="" width="4" height="16" />
        </button>
      </div>
    </div>
  </div>

  <!-- ── Nav tabs ──────────────────────────── -->
  <nav class="sq-page__nav">
    <button
      *ngFor="let tab of navTabs"
      class="sq-page__nav-tab"
      [class.sq-page__nav-tab--active]="tab.active"
    >{{ tab.label }}</button>
  </nav>

  <!-- ── Deliverables body ─────────────────── -->
  <div class="sq-page__body">

    <!-- Deliverable toolbar -->
    <div class="sq-page__del-toolbar">
      <div class="sq-page__del-toolbar-left">
        <button class="sq-page__icon-btn" aria-label="Menu">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="2" y1="4" x2="14" y2="4" stroke="#373737" stroke-width="1.5"/>
            <line x1="2" y1="8" x2="14" y2="8" stroke="#373737" stroke-width="1.5"/>
            <line x1="2" y1="12" x2="14" y2="12" stroke="#373737" stroke-width="1.5"/>
          </svg>
        </button>
        <h1 class="sq-page__del-title">Survey Questions</h1>
      </div>
      <div class="sq-page__del-toolbar-right">
        <button class="sq-page__icon-btn" aria-label="More options">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="3" r="1.5" fill="#373737"/>
            <circle cx="8" cy="8" r="1.5" fill="#373737"/>
            <circle cx="8" cy="13" r="1.5" fill="#373737"/>
          </svg>
        </button>
        <button class="sq-page__add-btn" aria-label="Add">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="8" y1="2" x2="8" y2="14" stroke="white" stroke-width="2"/>
            <line x1="2" y1="8" x2="14" y2="8" stroke="white" stroke-width="2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Filters bar -->
    <app-filters-bar
      [filterLinks]="filterLinks"
      [activeChartType]="activeChartType"
      (chartTypeChange)="onChartTypeChange($event)"
      (optionsClick)="chartOptionsOpen = true"
    ></app-filters-bar>

    <!-- Deliverable container -->
    <div class="sq-page__deliverable">

      <!-- Question selector -->
      <div class="sq-page__question-selector">
        <div class="sq-page__question-select">
          <span class="sq-page__question-title">{{ selectedQuestion.title }}</span>
          <svg class="sq-page__chevron-down" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 4.5L6 8l3.5-3.5" stroke="#373737" stroke-width="1.2"/>
          </svg>
        </div>
        <p class="sq-page__question-subtitle">{{ selectedQuestion.subtitle }}</p>
      </div>

      <!-- Table view -->
      <app-table-view
        *ngIf="activeChartType === 'table'"
        [concepts]="concepts"
        [rows]="rows"
        [summaryRows]="summaryRows"
      ></app-table-view>

    </div>
  </div>
</div>

<!-- Chart Options Drawer -->
<app-chart-options
  [open]="chartOptionsOpen"
  (openChange)="chartOptionsOpen = $event"
></app-chart-options>
