<div *ngIf="overlay" class="bases-spinner__overlay">
  <ng-container *ngTemplateOutlet="spinnerTpl"></ng-container>
</div>

<ng-container *ngIf="!overlay">
  <ng-container *ngTemplateOutlet="spinnerTpl"></ng-container>
</ng-container>

<ng-template #spinnerTpl>
  <div class="bases-spinner" [ngClass]="'bases-spinner--' + size" role="status">
    <svg class="bases-spinner__svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
      <circle opacity="0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path opacity="0.75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
    </svg>
    <span class="sr-only">{{ label }}</span>
  </div>
</ng-template>
