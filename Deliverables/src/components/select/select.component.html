<div class="bases-select">
  <label *ngIf="label" [attr.for]="selectId" class="bases-select__label">
    {{ label }}
  </label>

  <div class="bases-select__wrapper">
    <select
      [id]="selectId"
      [disabled]="disabled"
      [value]="value"
      [attr.aria-invalid]="error ? true : null"
      [class.bases-select__field--error]="error"
      class="bases-select__field"
      (change)="onChange($event)"
    >
      <option *ngIf="placeholder" value="" disabled>{{ placeholder }}</option>
      <option *ngFor="let opt of options" [value]="opt.value">{{ opt.label }}</option>
    </select>

    <svg class="bases-select__chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </div>

  <p *ngIf="error" class="bases-select__error" role="alert">{{ error }}</p>
</div>
